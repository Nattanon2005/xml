<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKAN Data Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#0f172a;
    color:white;
}
.card{
    background:#1e293b;
    border-radius:16px;
    border:none;
}
canvas{
    background:white;
    border-radius:12px;
}
</style>
</head>
<body>

<div class="container py-4">
    <h2 class="mb-4">📊 CKAN Data Dashboard</h2>

    <div class="row mb-3">
        <div class="col-md-8">
            <input type="text" id="searchText" class="form-control" placeholder="ค้นหาข้อมูล...">
        </div>
        <div class="col-md-4">
            <button onclick="loadData()" class="btn btn-primary w-100">ค้นหา</button>
        </div>
    </div>

    <div class="card p-3 mb-4">
        <div class="table-responsive">
            <table class="table table-dark table-striped" id="dataTable">
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card p-4">
        <canvas id="lineChart"></canvas>
    </div>
</div>

<script>
let recordsGlobal=[];
let lineChart;

async function loadData(){

    let q=document.getElementById("searchText").value;
    let url="api.php?limit=100";

    if(q) url+="&q="+encodeURIComponent(q);

    const response=await fetch(url);
    const data=await response.json();

    if(data.error){
        alert(data.error);
        return;
    }

    recordsGlobal=data.result.records;

    displayTable(recordsGlobal);
    createChart(recordsGlobal);
}

function displayTable(records){

    const head=document.getElementById("tableHead");
    const body=document.getElementById("tableBody");

    head.innerHTML="";
    body.innerHTML="";

    if(records.length===0){
        body.innerHTML="<tr><td>ไม่พบข้อมูล</td></tr>";
        return;
    }

    const keys=Object.keys(records[0]);

    keys.forEach(k=>{
        head.innerHTML+=`<th>${k}</th>`;
    });

    records.forEach(r=>{
        let row="<tr>";
        keys.forEach(k=>{
            row+=`<td>${r[k]}</td>`;
        });
        row+="</tr>";
        body.innerHTML+=row;
    });
}

function createChart(records){

    if(lineChart) lineChart.destroy();

    const keys=Object.keys(records[0]);

    const labels=records.map(r=>r[keys[0]]);
    const values=records.map(r=>parseFloat(r[keys[1]])||0);

    lineChart=new Chart(document.getElementById("lineChart"),{
        type:"line",
        data:{
            labels:labels,
            datasets:[{
                label:keys[1],
                data:values,
                borderColor:"cyan",
                tension:0.3
            }]
        }
    });
}

loadData();
</script>

</body>
</html>
